<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #7c6cfc; --accent2: #fc6cc8; --text: #e8e8f0;
      --muted: #5a5a78; --card: #16161f;
      --green: #6cfca0; --red: #fc6c6c;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk','Noto Sans Thai',sans-serif;
      min-height: 100vh; padding: 32px 16px 80px;
    }
    body::before {
      content: ''; position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%); width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(124,108,252,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .wrapper { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .header { margin-bottom: 32px; }
    .tag {
      display: inline-block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent2);
      background: rgba(252,108,200,0.1); border: 1px solid rgba(252,108,200,0.25);
      padding: 4px 12px; border-radius: 100px; margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(24px,5vw,32px); font-weight: 700;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 4px;
    }
    .subtitle { font-size: 13px; color: var(--muted); }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      padding: 8px 18px; border-radius: 100px; font-size: 13px;
      font-weight: 600; font-family: inherit; cursor: pointer;
      border: 1.5px solid var(--border); background: none;
      color: var(--muted); transition: all 0.2s;
    }
    .tab.active {
      background: rgba(124,108,252,0.15);
      border-color: var(--accent); color: var(--accent);
    }

    .section { display: none; }
    .section.active { display: block; }

    .empty {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 10px; }

    .card-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 14px;
    }
    .info { flex: 1; }
    .info .name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
    .info .meta { font-size: 13px; color: var(--muted); }
    .info .meta span { color: var(--text); font-weight: 500; }
    .actions { display: flex; gap: 8px; }
    .approve-btn, .reject-btn {
      border: none; border-radius: 10px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity 0.15s;
    }
    .approve-btn { background: rgba(108,252,160,0.15); color: var(--green); }
    .approve-btn:hover { background: rgba(108,252,160,0.25); }
    .reject-btn { background: rgba(252,108,108,0.12); color: var(--red); }
    .reject-btn:hover { background: rgba(252,108,108,0.22); }
    .delete-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 6px 8px;
      border-radius: 8px; transition: color 0.15s, background 0.15s;
    }
    .delete-btn:hover { color: var(--red); background: rgba(252,108,108,0.1); }

    .badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 100px; margin-left: 6px; vertical-align: middle;
    }
    .badge-pending { background: rgba(252,200,108,0.15); color: #fcc86c; }
    .badge-approved { background: rgba(108,252,160,0.15); color: var(--green); }

    .loading { text-align: center; color: var(--muted); padding: 32px; font-size: 14px; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card); border: 1px solid var(--accent);
      color: var(--text); font-size: 14px; padding: 10px 20px;
      border-radius: 100px; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="tag">Admin Only</div>
    <h1>Admin Panel</h1>
    <p class="subtitle">อนุมัติหรือปฏิเสธข้อมูลเพื่อนที่ส่งเข้ามา</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">
      รอการอนุมัติ <span class="badge badge-pending" id="pendingCount">0</span>
    </button>
    <button class="tab" onclick="switchTab('approved')">
      อนุมัติแล้ว <span class="badge badge-approved" id="approvedCount">0</span>
    </button>
  </div>

  <div class="section active" id="pendingSection">
    <div class="loading"><span class="spinner"></span>กำลังโหลด...</div>
  </div>
  <div class="section" id="approvedSection">
    <div class="loading"><span class="spinner"></span>กำลังโหลด...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const DB = 'https://namcial16-default-rtdb.asia-southeast1.firebaseio.com';
  let pendingData = {}, approvedData = {};

  async function load() {
    try {
      const [p, a] = await Promise.all([
        fetch(DB + '/pending.json').then(r => r.json()),
        fetch(DB + '/approved.json').then(r => r.json())
      ]);
      pendingData  = p  || {};
      approvedData = a || {};
      render();
    } catch(e) { showToast('❌ โหลดไม่ได้ ลองรีเฟรช'); }
  }

  function render() {
    const pKeys = Object.keys(pendingData);
    const aKeys = Object.keys(approvedData);
    document.getElementById('pendingCount').textContent  = pKeys.length;
    document.getElementById('approvedCount').textContent = aKeys.length;

    // Pending
    const pSec = document.getElementById('pendingSection');
    if (pKeys.length === 0) {
      pSec.innerHTML = `<div class="empty"><div class="icon">🎉</div>ไม่มีรายการรอการอนุมัติ</div>`;
    } else {
      pSec.innerHTML = pKeys.map(k => {
        const e = pendingData[k];
        return `<div class="card-item">
          <div class="info">
            <div class="name">${esc(e.name)}</div>
            <div class="meta">น้ำหนัก <span>${e.weight} กก.</span> · ส่วนสูง <span>${e.height} ซม.</span></div>
          </div>
          <div class="actions">
            <button class="approve-btn" onclick="approve('${k}')">✅ อนุมัติ</button>
            <button class="reject-btn"  onclick="reject('${k}')">❌ ปฏิเสธ</button>
          </div>
        </div>`;
      }).join('');
    }

    // Approved
    const aSec = document.getElementById('approvedSection');
    if (aKeys.length === 0) {
      aSec.innerHTML = `<div class="empty"><div class="icon">📋</div>ยังไม่มีรายการที่อนุมัติ</div>`;
    } else {
      aSec.innerHTML = aKeys.map(k => {
        const e = approvedData[k];
        return `<div class="card-item">
          <div class="info">
            <div class="name">${esc(e.name)}</div>
            <div class="meta">น้ำหนัก <span>${e.weight} กก.</span> · ส่วนสูง <span>${e.height} ซม.</span></div>
          </div>
          <button class="delete-btn" onclick="deleteApproved('${k}')">✕</button>
        </div>`;
      }).join('');
    }
  }

  async function approve(key) {
    const entry = pendingData[key];
    await Promise.all([
      fetch(DB + '/approved/' + key + '.json', { method: 'PUT', body: JSON.stringify(entry) }),
      fetch(DB + '/pending/'  + key + '.json', { method: 'DELETE' })
    ]);
    delete pendingData[key];
    approvedData[key] = entry;
    render();
    showToast('✅ อนุมัติ ' + entry.name + ' แล้ว!');
  }

  async function reject(key) {
    const entry = pendingData[key];
    await fetch(DB + '/pending/' + key + '.json', { method: 'DELETE' });
    delete pendingData[key];
    render();
    showToast('🗑️ ปฏิเสธ ' + entry.name + ' แล้ว');
  }

  async function deleteApproved(key) {
    const entry = approvedData[key];
    await fetch(DB + '/approved/' + key + '.json', { method: 'DELETE' });
    delete approvedData[key];
    render();
    showToast('🗑️ ลบ ' + entry.name + ' แล้ว');
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='pending')||(i===1&&tab==='approved')));
    document.getElementById('pendingSection').classList.toggle('active', tab==='pending');
    document.getElementById('approvedSection').classList.toggle('active', tab==='approved');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(() => el.classList.remove('show'), 2500);
  }

  load();
  setInterval(load, 5000);
</script>
</body>
</html>
